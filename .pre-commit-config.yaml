exclude: '^(\.venv|venv|env|\.git|\.pytest_cache|\.egg-info|migrations)/'

repos:
  # 1. Сортировка импортов (isort)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # 2. Форматирование кода (black)
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["--line-length", "120"]

  # 3. Проверка стиля и ошибок (flake8)
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--ignore=E501,W503"]